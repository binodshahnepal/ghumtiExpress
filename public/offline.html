<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f57224">
  <title>Ghumti Express - Offline</title>
  <style>
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; padding: 24px; display: grid; place-items: center; background: #f5f6f8; color: #0f172a; font-family: Arial, sans-serif; }
    main { width: min(100%, 440px); padding: 36px; border-radius: 20px; background: #fff; box-shadow: 0 16px 50px rgba(15, 23, 42, .12); text-align: center; }
    img { width: 92px; height: 92px; border-radius: 20px; }
    h1 { margin: 20px 0 8px; }
    p { margin: 0 0 24px; color: #64748b; line-height: 1.6; }
    button { padding: 12px 20px; border: 0; border-radius: 9px; background: #f57224; color: #fff; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <img src="/logo.png" alt="Ghumti Express">
    <h1>You are offline</h1>
    <p>Reconnect to the internet to browse products, update your cart and place an order.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
